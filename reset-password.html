<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nouveau mot de passe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  background: #f7f7f5;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 22px;
  overflow-x: hidden;
}
.card {
  width: 100%;
  max-width: 380px;
  background: rgba(255,255,255,.92);
  border-radius: 30px;
  padding: 28px 24px;
  box-shadow: 0 25px 80px rgba(0,0,0,.12);
}
.logo {
  width: 110px;
  display: block;
  margin: 0 auto 18px;
}
h1 {
  font-size: 23px;
  line-height: 1.15;
  margin-bottom: 10px;
  color: #1d1d1f;
  white-space: nowrap;
}
p {
  color: #6e6e73;
  font-size: 15px;
  margin-bottom: 24px;
}
.field {
  margin-bottom: 14px;
}
label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 7px;
}
input {
  width: 100%;
  border: 1px solid rgba(0,0,0,.12);
  border-radius: 16px;
  padding: 15px;
  font-size: 16px;
  outline: none;
  background: white;
}
input:focus {
  border-color: #111;
}
.error {
  color: #dc2626;
  font-size: 13px;
  margin: 6px 0 14px;
  display: none;
}
.btn-main {
  width: 100%;
  border: none;
  border-radius: 999px;
  background: #111;
  color: white;
  padding: 13px;
  font-size: 15px;
  font-weight: 700;
}
.btn-main:disabled {
  opacity: .35;
}
  
.btn-cancel {
  width: 100%;
  border: none;
  background: none;
  color: #8a8a8e;
  font-size: 14px;
  margin-top: 14px;
}
</style>
</head>
<body>
<div class="card">
  <img src="https://i.imgur.com/1ZFTLIo.png" class="logo" alt="Clarity Systems">
  <h1>Nouveau mot de passe</h1>
  <p>Veuillez définir votre nouveau mot de passe.</p>
  <div class="field">
    <label>Mot de passe</label>
    <input id="newPassword" type="password" placeholder="Minimum 8 caractères" oninput="checkPasswords()">
  </div>
  <div class="field">
    <label>Confirmation</label>
    <input id="confirmPassword" type="password" placeholder="Confirmer le mot de passe" oninput="checkPasswords()">
  </div>
  <div id="passwordError" class="error"></div>
  <button id="updateBtn" class="btn-main" onclick="updatePassword()" disabled>
    Modifier mon mot de passe
  </button>
  <button class="btn-cancel" onclick="cancelReset()">
    Annuler
  </button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "TON_URL_SUPABASE";
const SUPABASE_ANON_KEY = "TA_CLE_ANON_SUPABASE";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.addEventListener("load", async () => {
  const nav = performance.getEntriesByType("navigation")[0];
  if (nav && nav.type === "reload") {
    await supabaseClient.auth.signOut();
    window.location.href = "index.html";
    return;
  }
  setTimeout(async () => {
    const { data } = await supabaseClient.auth.getSession();
    if (!data.session) {
      window.location.href = "index.html";
    }
  }, 500);
});
function checkPasswords() {
  const password = document.getElementById("newPassword").value;
  const confirm = document.getElementById("confirmPassword").value;
  const error = document.getElementById("passwordError");
  const button = document.getElementById("updateBtn");
  error.style.display = "none";
  error.textContent = "";
  button.disabled = true;
  if (!password && !confirm) return;
  if (password.length < 8) {
    error.textContent = "Le mot de passe doit contenir au moins 8 caractères.";
    error.style.display = "block";
    return;
  }
  if (confirm && password !== confirm) {
    error.textContent = "Les deux mots de passe ne sont pas identiques.";
    error.style.display = "block";
    return;
  }
  if (password === confirm) {
    button.disabled = false;
  }
}
async function updatePassword() {
  const password = document.getElementById("newPassword").value;
  const confirm = document.getElementById("confirmPassword").value;
  const error = document.getElementById("passwordError");
  if (password !== confirm) {
    error.textContent = "Les deux mots de passe ne sont pas identiques.";
    error.style.display = "block";
    return;
  }
  const { error: updateError } = await supabaseClient.auth.updateUser({
    password: password
  });
  if (updateError) {
    error.textContent = "Impossible de modifier le mot de passe.";
    error.style.display = "block";
    console.error(updateError);
    return;
  }
  window.location.href = "dashboard.html";
}
async function cancelReset() {
  await supabaseClient.auth.signOut();
  window.location.href = "index.html";
}
</script>
</body>
</html>
